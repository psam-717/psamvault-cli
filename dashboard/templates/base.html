<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}psamvault{% endblock %} · psamvault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:opsz@6..12&family=Outfit:wght@100..900&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet">
<script src="{{ url_for('static', filename='htmx.min.js') }}"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════════════════
   psamvault Dashboard — Obsidian Vault
   Dark editorial luxury with warm amber accents
   ═══════════════════════════════════════════════════════════════════════════════ */

/* ── Design tokens ──────────────────────────────────────────────────────────── */
:root {
  --bg-base:        #07080a;
  --bg-surface:     #11131a;
  --bg-elevated:    #181b24;
  --bg-hover:       #1e2130;
  --bg-active:      #25283a;

  --border-subtle:  #1e2130;
  --border-hover:   #2a2e3e;
  --border-focus:   #d4a84b;

  --text-primary:   #e8e6e1;
  --text-secondary: #8b8f9c;
  --text-muted:     #555a66;

  --accent-gold:    #d4a84b;
  --accent-gold-hover: #e5b95e;
  --accent-gold-glow:  rgba(212, 168, 75, 0.25);
  --accent-emerald: #3bae7c;
  --accent-ruby:    #e45a5a;
  --accent-sapphire:#5a7ae4;

  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body:    'Outfit', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', 'Fira Code', monospace;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  14px;
  --radius-xl:  20px;

  --shadow-card: 0 2px 20px rgba(0,0,0,0.4);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px var(--accent-gold-glow);

  --transition: 200ms cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* ── Reset & base ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }

body {
  font-family: var(--font-body);
  background: var(--bg-base);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%, rgba(212, 168, 75, 0.03) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(59, 174, 124, 0.02) 0%, transparent 60%);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 1.5rem 1rem;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: var(--accent-gold); text-decoration: none; transition: color var(--transition); }
a:hover { color: var(--accent-gold-hover); text-decoration: underline; }

/* ── Scrollbar ───────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Container ───────────────────────────────────────────────────────────────── */
.app-container {
  width: 100%;
  max-width: 1120px;
  animation: fadeIn 0.4s ease;
}

/* ── Top bar ─────────────────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 1.75rem;
}

.logo-area { display: flex; align-items: center; gap: 0.85rem; }
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(145deg, #d4a84b, #b8922e);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 1rem; font-weight: 400; color: #07080a;
  box-shadow: 0 4px 16px rgba(212, 168, 75, 0.3);
}
.logo-text {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 400;
  letter-spacing: -0.01em; color: var(--text-primary);
}
.logo-text span { color: var(--accent-gold); }

.topbar-right { display: flex; align-items: center; gap: 1rem; }
.user-badge {
  display: flex; align-items: center; gap: 0.5rem;
  background: var(--bg-surface);
  padding: 0.35rem 0.75rem 0.35rem 0.35rem;
  border-radius: var(--radius-md);
  font-size: 0.8rem; color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
  transition: border-color var(--transition);
}
.user-badge:hover { border-color: var(--border-hover); }
.user-avatar {
  width: 26px; height: 26px; border-radius: var(--radius-sm);
  background: linear-gradient(145deg, var(--accent-gold), #b8922e);
  display: flex; align-items: center; justify-content: center;
  color: #07080a; font-size: 0.65rem; font-weight: 700;
}

/* ── Stats cards ─────────────────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-bottom: 1.75rem;
}
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  transition: all var(--transition);
  animation: statFadeIn 0.5s ease both;
  position: relative;
  overflow: hidden;
}
.stat-card:nth-child(1) { animation-delay: 0.05s; }
.stat-card:nth-child(2) { animation-delay: 0.12s; }
.stat-card:nth-child(3) { animation-delay: 0.19s; }
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  opacity: 0; transition: opacity var(--transition);
}
.stat-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-card);
  transform: translateY(-2px);
}
.stat-card:hover::before { opacity: 1; }

.stat-card:nth-child(1)::before {
  background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
}
.stat-card:nth-child(2)::before {
  background: linear-gradient(90deg, transparent, var(--accent-emerald), transparent);
}
.stat-card:nth-child(3)::before {
  background: linear-gradient(90deg, transparent, var(--accent-sapphire), transparent);
}

.stat-icon {
  width: 44px; height: 44px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
  position: relative;
}
.stat-icon.entries { background: rgba(212, 168, 75, 0.12); color: var(--accent-gold); }
.stat-icon.apikeys { background: rgba(59, 174, 124, 0.12); color: var(--accent-emerald); }
.stat-icon.storage { background: rgba(90, 122, 228, 0.12); color: var(--accent-sapphire); }
.stat-label {
  font-size: 0.7rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
}
.stat-value {
  font-size: 1.6rem; font-weight: 700;
  color: var(--text-primary); letter-spacing: -0.03em; line-height: 1.2;
}
.stat-detail { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }

/* ── Tab bar ─────────────────────────────────────────────────────────────────── */
.tab-bar {
  display: flex; gap: 0.25rem;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 0.25rem;
  margin-bottom: 1.5rem;
}
.tab-btn {
  flex: 1;
  background: none; border: none;
  color: var(--text-muted);
  padding: 0.6rem 1rem;
  border-radius: calc(var(--radius-md) - 2px);
  font-size: 0.8rem; font-weight: 500; cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-body);
  display: flex; align-items: center; justify-content: center; gap: 0.4rem;
}
.tab-btn:hover { color: var(--text-secondary); background: var(--bg-hover); }
.tab-btn.active {
  background: var(--bg-elevated);
  color: var(--accent-gold);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.tab-badge {
  background: var(--bg-hover); color: var(--text-muted);
  font-size: 0.65rem; padding: 0.1rem 0.5rem;
  border-radius: 99px; font-weight: 600;
  transition: all var(--transition);
}
.tab-btn.active .tab-badge {
  background: rgba(212, 168, 75, 0.15);
  color: var(--accent-gold);
}

/* ── Toolbar ─────────────────────────────────────────────────────────────────── */
.toolbar { display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: center; }
.search-wrapper { flex: 1; position: relative; }
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  width: 16px; height: 16px;
}
.search-input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 0.6rem 0.8rem 0.6rem 2.4rem;
  color: var(--text-primary);
  font-size: 0.8rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 3px rgba(212, 168, 75, 0.08);
}

/* ── Buttons ─────────────────────────────────────────────────────────────────── */
.btn-primary {
  background: linear-gradient(145deg, var(--accent-gold), #c49a3c);
  border: none; color: #07080a;
  padding: 0.6rem 1.25rem;
  border-radius: var(--radius-md);
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-body);
  display: flex; align-items: center; gap: 0.4rem;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(212, 168, 75, 0.25);
}
.btn-primary:hover {
  background: linear-gradient(145deg, var(--accent-gold-hover), #d4a84b);
  box-shadow: 0 4px 20px rgba(212, 168, 75, 0.35);
  transform: translateY(-1px);
}
.btn-primary:active {
  transform: translateY(0);
  box-shadow: 0 1px 6px rgba(212, 168, 75, 0.2);
}

.btn-secondary {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  padding: 0.6rem 1.25rem;
  border-radius: var(--radius-md);
  font-size: 0.8rem; font-weight: 500; cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-body);
  display: inline-flex; align-items: center; gap: 0.4rem;
  text-decoration: none;
}
.btn-secondary:hover {
  background: var(--bg-hover);
  border-color: var(--border-hover);
  color: var(--text-primary);
  text-decoration: none;
}

/* ── Entries table ───────────────────────────────────────────────────────────── */
.entries-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color var(--transition);
}
.entries-card:hover { border-color: var(--border-hover); }

.entries-table { width: 100%; border-collapse: collapse; }
.entries-table th {
  text-align: left; padding: 0.7rem 1rem;
  font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-subtle);
  background: rgba(0,0,0,0.15);
}
.entries-table td {
  padding: 0.8rem 1rem; font-size: 0.83rem;
  border-bottom: 1px solid rgba(30, 33, 48, 0.5);
  color: var(--text-secondary);
  vertical-align: middle;
}
.entries-table tr:last-child td { border-bottom: none; }
.entries-table tbody tr {
  transition: background var(--transition);
}
.entries-table tbody tr:hover td { background: rgba(212, 168, 75, 0.03); }

.site-cell { display: flex; align-items: center; gap: 0.7rem; }
.site-favicon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  display: flex; align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.7rem; font-weight: 600;
  flex-shrink: 0; border: 1px solid var(--border-subtle);
  color: var(--text-muted);
}
.site-name { font-weight: 600; color: var(--text-primary); }
.site-url { display: block; font-size: 0.7rem; color: var(--text-muted); margin-top: 0.05rem; }
.mono { font-family: var(--font-mono); font-size: 0.78rem; }

.actions-cell { display: flex; gap: 0.25rem; justify-content: flex-end; }
.btn-action {
  background: none; border: 1px solid transparent;
  color: var(--text-muted);
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 0.85rem;
  transition: all var(--transition);
}
.btn-action:hover { background: var(--bg-hover); border-color: var(--border-subtle); }
.btn-action.view:hover { color: var(--accent-sapphire); border-color: rgba(90, 122, 228, 0.25); }
.btn-action.edit:hover { color: var(--accent-gold); border-color: rgba(212, 168, 75, 0.25); }
.btn-action.delete:hover { color: var(--accent-ruby); border-color: rgba(228, 90, 90, 0.25); }

/* ── Empty state ─────────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }
.empty-text { font-size: 0.9rem; margin-bottom: 0.25rem; color: var(--text-secondary); }
.empty-sub { font-size: 0.8rem; color: var(--text-muted); }

/* ── Modal ───────────────────────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
  z-index: 100; align-items: center; justify-content: center;
  animation: overlayIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s ease;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border-subtle);
}
.modal-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
.modal-close {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 1.2rem; cursor: pointer;
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center;
  justify-content: center; transition: all var(--transition);
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-secondary); }
.modal-body { padding: 1.5rem; }
.modal-footer {
  display: flex; gap: 0.75rem; justify-content: flex-end;
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--border-subtle);
}

/* ── Forms ───────────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 1rem; }
.form-label {
  display: block; font-size: 0.75rem; font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.35rem;
  letter-spacing: 0.02em;
}
.form-input, .form-textarea {
  width: 100%;
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 0.55rem 0.8rem;
  color: var(--text-primary);
  font-size: 0.85rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-textarea { min-height: 70px; resize: vertical; }
.form-input:focus, .form-textarea:focus {
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 3px rgba(212, 168, 75, 0.08);
}
.form-hint { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.2rem; }

/* ── Alert banner ────────────────────────────────────────────────────────────── */
.alert {
  padding: 0.75rem 1rem;
  border-radius: var(--radius-md);
  font-size: 0.83rem;
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.alert-error {
  background: rgba(228, 90, 90, 0.08);
  border: 1px solid rgba(228, 90, 90, 0.15);
  color: #f5a5a5;
}
.alert-success {
  background: rgba(59, 174, 124, 0.08);
  border: 1px solid rgba(59, 174, 124, 0.15);
  color: #6ecc9e;
}
.alert-info {
  background: rgba(212, 168, 75, 0.08);
  border: 1px solid rgba(212, 168, 75, 0.15);
  color: var(--accent-gold);
}

/* ── Toast ───────────────────────────────────────────────────────────────────── */
.toast-container {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  z-index: 200;
  display: flex; flex-direction: column; gap: 0.5rem;
}
.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 0.7rem 1rem;
  font-size: 0.83rem;
  color: var(--text-primary);
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  backdrop-filter: blur(8px);
}
.toast.success { border-color: rgba(59, 174, 124, 0.3); }
.toast.error { border-color: rgba(228, 90, 90, 0.3); }
.toast.info { border-color: rgba(212, 168, 75, 0.3); }

/* ── Login page ──────────────────────────────────────────────────────────────── */
.login-wrapper {
  display: flex; align-items: center; justify-content: center;
  min-height: 80vh; width: 100%;
}
.login-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 2.5rem;
  width: 100%; max-width: 400px;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.35s ease;
}
.login-header { text-align: center; margin-bottom: 1.5rem; }
.login-logo-icon {
  width: 52px; height: 52px; margin: 0 auto;
  background: linear-gradient(145deg, var(--accent-gold), #b8922e);
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 1.2rem; color: #07080a;
  box-shadow: 0 4px 20px rgba(212, 168, 75, 0.3);
}
.login-title {
  font-family: var(--font-display);
  font-size: 1.4rem; font-weight: 400;
  color: var(--text-primary);
  margin-top: 0.75rem;
}
.login-subtitle { font-size: 0.83rem; color: var(--text-muted); margin-top: 0.3rem; }
.cli-login-box {
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 1.5rem 1.25rem;
  text-align: center; margin-bottom: 1rem;
  position: relative;
}
.cli-login-box::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212, 168, 75, 0.15), transparent);
}
.cli-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.cli-code {
  background: var(--bg-elevated);
  color: var(--accent-gold);
  font-family: var(--font-mono);
  padding: 0.5rem 1.25rem;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  display: inline-block; letter-spacing: 0.04em;
  border: 1px solid rgba(212, 168, 75, 0.1);
}

/* ── Back button ─────────────────────────────────────────────────────────────── */
.btn-back {
  display: inline-flex; align-items: center; gap: 0.3rem;
  color: var(--text-muted);
  font-size: 0.83rem; margin-bottom: 1rem;
  border: none; background: none; cursor: pointer;
  font-family: var(--font-body);
  transition: color var(--transition);
}
.btn-back:hover { color: var(--text-secondary); text-decoration: none; }

/* ── Animations ──────────────────────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes statFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes overlayIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes pageSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes detailReveal {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes rowSlideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Vault grid overlay (subtle — like a safety-deposit pattern) ─────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9999;
  background-image:
    repeating-linear-gradient(
      0deg, transparent, transparent 59px,
      rgba(212, 168, 75, 0.015) 59px, rgba(212, 168, 75, 0.015) 60px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 59px,
      rgba(212, 168, 75, 0.015) 59px, rgba(212, 168, 75, 0.015) 60px
    );
}

/* ── Selection ──────────────────────────────────────────────────────────────── */
::selection { background: rgba(212, 168, 75, 0.35); color: #fff; }
::-moz-selection { background: rgba(212, 168, 75, 0.35); color: #fff; }

/* ── Focus-visible ring ─────────────────────────────────────────────────────── */

}

/* ── Page enter animation (applied to main content wrapper) ─────────────────── */

}

/* ── Decorative gold divider ────────────────────────────────────────────────── */
.gold-divider {
  height: 1px;

    90deg,

/* ── Detail header ───────────────────────────────────────────────────────────── */

}
.detail-header-icon {

.detail-action-btn.delete {

/* ── Stat card enhancements ──────────────────────────────────────────────────── */
.stat-card { overflow: hidden; }
.stat-icon {
  position: relative;

.stat-icon::after {
  content: '';

  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  pointer-events: none;

.entries-table tbody tr {

}
.entries-table tbody tr:nth-child(1) { animation-delay: 0.02s; }
.entries-table tbody tr:nth-child(2) { animation-delay: 0.04s; }
.entries-table tbody tr:nth-child(3) { animation-delay: 0.06s; }
.entries-table tbody tr:nth-child(4) { animation-delay: 0.08s; }
.entries-table tbody tr:nth-child(5) { animation-delay: 0.10s; }
.entries-table tbody tr:nth-child(6) { animation-delay: 0.12s; }
.entries-table tbody tr:nth-child(7) { animation-delay: 0.14s; }
.entries-table tbody tr:nth-child(8) { animation-delay: 0.16s; }
.entries-table tbody tr:nth-child(9) { animation-delay: 0.18s; }
.entries-table tbody tr:nth-child(10) { animation-delay: 0.20s; }
.entries-table tbody tr:nth-child(11) { animation-delay: 0.22s; }
.entries-table tbody tr:nth-child(12) { animation-delay: 0.24s; }
.entries-table tbody tr:nth-child(13) { animation-delay: 0.26s; }
.entries-table tbody tr:nth-child(14) { animation-delay: 0.28s; }
.entries-table tbody tr:nth-child(15) { animation-delay: 0.30s; }

/* ── Search enhancement ──────────────────────────────────────────────────────── */
.search-wrapper:focus-within {
  flex: 1.05;
  transition: flex var(--transition);
}

/* ── Empty state enhancement ─────────────────────────────────────────────────── */
.empty-icon {
  font-size: 2.5rem;
  margin-bottom: 0.75rem;
  opacity: 0.5;
  position: relative;
  display: inline-block;

/* ── Badge count ─────────────────────────────────────────────────────────────── */
.tab-badge-count {
  display: inline-flex; align-items: center; justify-content: center;

  background: var(--bg-hover); color: var(--text-muted);
  font-size: 0.6rem; padding: 0 0.35rem;
  border-radius: 99px; font-weight: 600;
  transition: all var(--transition);
}
.tab-btn.active .tab-badge-count {
  background: rgba(212, 168, 75, 0.15);
  color: var(--accent-gold);

/* ── Login card atmosphere ───────────────────────────────────────────────────── */
.login-card {
  position: relative;
  overflow: hidden;
}
.login-cli-text {

}
.login-cli-hint {

}
.login-cli-action {

  color: var(--text-muted);

}
.btn-full {

}
.login-card::before {
  content: '';

  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(212, 168, 75, 0.5) 20%,
    var(--accent-gold) 50%,
    rgba(212, 168, 75, 0.5) 80%,
    transparent 100%
  );
}

/* ── Logout button refinement ─────────────────────────────────────────────────── */
.btn-logout {
  padding: 0.45rem 1rem !important;
  font-size: 0.8rem !important;
}

/* ── Mono inline ─────────────────────────────────────────────────────────────── */
.mono-inline {
  font-family: var(--font-mono);
  font-size: 0.78rem;
}

/* ── Table column size hints ─────────────────────────────────────────────────── */
.col-site { width: 38%; }
.col-username { width: 30%; }
.col-date { width: 15%; }
.col-actions { width: 17%; }

/* ── Table cell date ─────────────────────────────────────────────────────────── */
.cell-date {
  color: var(--text-muted);
  font-size: 0.8rem;
}

/* ── Table action form (inline) ──────────────────────────────────────────────── */
.actions-form {
  display: inline;
}

/* ── Button icon helper ──────────────────────────────────────────────────────── */
.btn-icon {
  font-size: 1.1rem;

}

/* ── Text accent color (gold) ────────────────────────────────────────────────── */
.text-accent {
  color: var(--accent-gold);
}

/* ── Responsive ──────────────────────────────────────────────────────────────── */
@media (max-width: 820px) {
  .detail-header { flex-direction: column; align-items: flex-start; }
  .detail-actions { align-self: flex-start; }
  .detail-action-btn { padding: 0.35rem 0.65rem; font-size: 0.75rem; }
}
@media (max-width: 700px) {
  body { padding: 1rem 0.75rem; }
  .stats-row { grid-template-columns: 1fr; }
  .stat-card:nth-child(2) { animation-delay: 0.08s; }
  .stat-card:nth-child(3) { animation-delay: 0.16s; }
  .entries-table th:nth-child(3),
  .entries-table td:nth-child(3) { display: none; }
  .actions-cell .btn-action span { display: none; }
  .toolbar { flex-wrap: wrap; }
  .toolbar .btn-primary, .toolbar .btn-secondary { flex: 1; justify-content: center; }
  .topbar { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
  .detail-row { flex-direction: column; gap: 0.25rem; }
  .detail-label { width: auto; }
  .detail-panel { padding: 1.25rem; }
  .login-card { padding: 1.5rem; }
  .gold-divider { margin-bottom: 1.25rem; }
}
@media (max-width: 480px) {
  html { font-size: 14px; }
  .entries-table th:nth-child(4),
  .entries-table td:nth-child(4) { display: none; }

  .detail-panel { padding: 1rem; border-radius: var(--radius-lg); }
  .detail-header-icon { width: 36px; height: 36px; font-size: 0.75rem; }
  .detail-header h2 { font-size: 1.1rem; }
}

<body>
<div class="app-container">
  {# ── Flash messages auto-convert to toasts ── #}
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div id="flash-data" style="display:none;"
       data-messages='{{ messages | tojson }}'></div>
  {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ── Modal helpers ──
function openModal(id) { document.getElementById('modal-' + id).classList.add('open'); }
function closeModal(id) { document.getElementById('modal-' + id).classList.remove('open'); }

// ── Password toggle ──
function togglePw(id) {
  const el = document.getElementById(id);
  if (el) el.type = el.type === 'password' ? 'text' : 'password';
}

// ── Toast ──
function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Convert flash messages to toasts on page load ──
(function() {
  const el = document.getElementById('flash-data');
  if (el && el.dataset.messages) {
    try {
      const msgs = JSON.parse(el.dataset.messages);
      msgs.forEach(function(m) {
        if (Array.isArray(m)) {
          const cat = m[0];
          const style = cat === 'error' ? 'error' : cat === 'info' ? 'info' : 'success';
          showToast(m[1] || m[0], style);
        } else showToast(m, 'success');
      });
    } catch(e) {}
  }
})();

// ── Close modals on overlay click ──
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});

// ── Auto-show toast when HTMX-triggered messages arrive ──
document.addEventListener('htmx:afterSwap', function(evt) {
  const toastEl = evt.detail.elt.querySelector('[data-toast]');
  if (toastEl) showToast(toastEl.dataset.toast, toastEl.dataset.toastType || 'success');
});

// ── Client-side validation ──────────────────────────────────────────────
const FORBIDDEN_CHARS = /[\\\/"' <>|?*&#%]/;

function validateSiteName(input) {
  const val = input.value.trim();
  if (!val) return 'Site name cannot be blank';
  const found = val.match(FORBIDDEN_CHARS);
  if (found) return 'Invalid character(s): ' + [...new Set(found)].join(' ');
  return '';
}

function validateLoginUrl(input) {
  const val = input.value.trim();
  if (val && !val.startsWith('http://') && !val.startsWith('https://')) {
    return 'Login URL must start with http:// or https://';
  }
  return '';
}

function validatePassword(input) {
  const val = input.value.trim();
  const errors = [];
  if (val.length > 0 && val.length < 8) errors.push('at least 8 characters');
  if (val.length > 0 && !/[A-Z]/.test(val)) errors.push('at least one uppercase letter');
  if (val.length > 0 && !/[0-9]/.test(val)) errors.push('at least one digit');
  return errors.length ? 'Password must have: ' + errors.join(', ') : '';
}

function showFieldError(input, msg) {
  // Remove any existing error for this field
  const parent = input.closest('.form-group') || input.parentElement;
  const existing = parent.querySelector('.field-error');
  if (existing) existing.remove();
  if (!msg) return true;

  const err = document.createElement('div');
  err.className = 'form-hint field-error';
  err.style.cssText = 'color:#f87171;margin-top:0.25rem;';
  err.textContent = msg;
  parent.appendChild(err);
  return false;
}

// ── Hook up validation on all modals and forms ──
document.addEventListener('DOMContentLoaded', function() {
  // Add-entry modal form validation
  const addEntryForm = document.querySelector('#modal-add-entry form');
  if (addEntryForm) {
    addEntryForm.addEventListener('submit', function(e) {
      const siteName = this.querySelector('[name="site_name"]');
      const password = this.querySelector('[name="password"]');
      const loginUrl = this.querySelector('[name="login_url"]');

      let ok = true;
      ok &= showFieldError(siteName, validateSiteName(siteName));
      if (password.value.trim()) {
        ok &= showFieldError(password, validatePassword(password));
      } else {
        showFieldError(password, 'Password is required');
        ok = false;
      }
      ok &= showFieldError(loginUrl, validateLoginUrl(loginUrl));

      if (!ok) e.preventDefault();
    });

    // Clear errors when user starts typing
    addEntryForm.querySelectorAll('input, textarea').forEach(function(el) {
      el.addEventListener('input', function() {
        const parent = this.closest('.form-group') || this.parentElement;
        const err = parent.querySelector('.field-error');
        if (err) err.remove();
      });
    });
  }

  // Add-apikey modal form validation
  const addAkForm = document.querySelector('#modal-add-apikey form');
  if (addAkForm) {
    addAkForm.addEventListener('submit', function(e) {
      const name = this.querySelector('[name="name"]');
      const key = this.querySelector('[name="api_key"]');

      let ok = true;
      ok &= showFieldError(name, validateSiteName(name));
      if (!key.value.trim()) {
        showFieldError(key, 'API key is required');
        ok = false;
      }

      if (!ok) e.preventDefault();
    });

    addAkForm.querySelectorAll('input, textarea').forEach(function(el) {
      el.addEventListener('input', function() {
        const parent = this.closest('.form-group') || this.parentElement;
        const err = parent.querySelector('.field-error');
        if (err) err.remove();
      });
    });
  }

  // Edit entry form validation (on the edit page, not modal)
  const editForm = document.querySelector('.detail-panel form');
  if (editForm && !editForm.closest('.modal')) {
    editForm.addEventListener('submit', function(e) {
      const loginUrl = this.querySelector('[name="login_url"]');
      let ok = true;
      ok &= showFieldError(loginUrl, validateLoginUrl(loginUrl));
      if (!ok) e.preventDefault();
    });
  }
});
</script>
</body>
