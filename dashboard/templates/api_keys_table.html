<div class="toolbar">
  <div class="search-wrapper">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search-input" type="text" placeholder="Search API keys..."
           name="search"
           hx-get="{{ url_for('dashboard.api_keys_list') }}"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#tab-content"
           hx-swap="innerHTML"
           hx-include="this" />
  </div>
  <button type="button" class="btn-primary" onclick="openModal('add-apikey')">
    <span class="btn-icon">+</span> Add API Key
  </button>
  <button type="button" class="btn-secondary" onclick="document.querySelector('.tab-btn:first-child').click()">
    ← Vault
  </button>
</div>

<div class="entries-card">
  {% if api_keys %}
  <table class="entries-table">
    <thead>
      <tr>
        <th class="col-site">Name</th>
        <th class="col-username">Service hint</th>
        <th class="col-date">Updated</th>
        <th class="col-actions"></th>
      </tr>
    </thead>
    <tbody>
      {% for key in api_keys %}
      <tr>
        <td>
          <div class="site-cell">
            <div class="site-favicon">🔑</div>
            <div class="site-name">{{ key.name }}</div>
          </div>
        </td>
        <td><span class="mono-inline">{{ key.service_hint }}</span></td>
        <td class="cell-date">{{ key.updated_at }}</td>
        <td>
          <div class="actions-cell">
            <a href="{{ url_for('dashboard.api_keys_detail', name=key.name) }}" class="btn-action view" title="View details">👁</a>
            <a href="{{ url_for('dashboard.api_keys_edit', name=key.name) }}" class="btn-action edit" title="Edit">✏️</a>
            <form method="POST" action="{{ url_for('dashboard.api_keys_delete', name=key.name) }}"
                  class="actions-form" onsubmit="return confirm('Delete API key ' + {{ key.name | tojson }} + '?')">
              <button type="submit" class="btn-action delete" title="Delete">🗑️</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <div class="empty-state">
    <div class="empty-icon">🔑</div>
    <div class="empty-text">No API keys stored</div>
    <div class="empty-sub">Use <span class="mono-inline text-accent">psamvault ak-add</span> or click "+ Add API Key" to store your first key</div>
  </div>
  {% endif %}
</div>
