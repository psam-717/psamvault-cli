{% extends "base.html" %}
{% block title %}Edit {{ entry.site_name }}{% endblock %}
{% block content %}

<div class="page-enter">

<a href="{{ url_for('dashboard.entries_detail', site_name=entry.site_name) }}" class="btn-back">← Back to {{ entry.site_name }}</a>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="detail-panel">
  <div class="edit-title">✏️ Edit {{ entry.site_name }}</div>

  <form method="POST">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" id="username" name="username" type="text"
             value="{{ entry.username }}" placeholder="Leave blank to keep current" />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" id="password" name="password" type="password"
             placeholder="Leave blank to keep current" />
      <div class="form-hint">Leave blank to keep the current password unchanged</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="login_url">Login URL</label>
      <input class="form-input" id="login_url" name="login_url" type="url"
             value="{{ entry.login_url or '' }}" placeholder="https://" />
    </div>
    <div class="form-group">
      <label class="form-label" for="notes">Notes</label>
      <textarea class="form-textarea" id="notes" name="notes"
                placeholder="Leave blank to keep current">{{ entry.notes }}</textarea>
    </div>
    <div class="form-footer">
      <a href="{{ url_for('dashboard.entries_detail', site_name=entry.site_name) }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Save Changes</button>
    </div>
  </form>
</div>

</div>{# /page-enter #}
{% endblock %}
