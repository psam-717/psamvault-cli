name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      # Provide a valid 64-char hex pepper so crypto.py doesn't hit the keychain
      PSAMVAULT_PEPPER: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      PSAMVAULT_API_URL: "https://test.example.com"
      # Force keyring to use a null backend — no OS keychain available in CI
      PYTHON_KEYRING_BACKEND: "keyring.backends.null.Keyring"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-mock pytest-httpx

      - name: Run tests
        run: pytest tests/ -v
