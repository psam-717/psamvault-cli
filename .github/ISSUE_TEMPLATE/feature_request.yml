name: Feature Request
description: Suggest an idea for psamvault
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! Please describe what you'd like to see added.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or frustration does this feature address?
      placeholder: "It's annoying that I have to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal behaviour look like?
      placeholder: "There should be a command like psamvault ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?
      placeholder: "I currently work around this by ..."

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and found nothing matching
          required: true
